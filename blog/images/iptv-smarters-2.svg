<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#f8f9ff"/>
  <!-- Central device: Smartphone -->
  <rect x="300" y="60" width="200" height="340" rx="20" ry="20" fill="#002B7F"/>
  <rect x="312" y="80" width="176" height="280" rx="6" ry="6" fill="#0a1a3a"/>
  <!-- Phone screen - IPTV Smarters UI -->
  <rect x="316" y="84" width="168" height="30" rx="4" fill="#1a2a5a"/>
  <text x="400" y="104" font-family="system-ui,sans-serif" font-size="12" fill="#FCD116" text-anchor="middle" font-weight="bold">IPTV Smarters Pro</text>
  <!-- Category buttons -->
  <rect x="318" y="118" width="80" height="22" rx="4" fill="#FCD116"/>
  <text x="358" y="133" font-family="system-ui,sans-serif" font-size="10" fill="#002B7F" text-anchor="middle" font-weight="bold">Live TV</text>
  <rect x="402" y="118" width="80" height="22" rx="4" fill="#ffffff" opacity="0.15"/>
  <text x="442" y="133" font-family="system-ui,sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">VOD</text>
  <!-- Channel list items -->
  <rect x="316" y="146" width="168" height="32" rx="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="334" cy="162" r="10" fill="#CE1126"/>
  <text x="334" y="166" font-family="system-ui,sans-serif" font-size="7" fill="#fff" text-anchor="middle">P</text>
  <text x="356" y="159" font-family="system-ui,sans-serif" font-size="10" fill="#FCD116">PRO TV</text>
  <text x="356" y="171" font-family="system-ui,sans-serif" font-size="8" fill="#aaaacc">Știri • Live</text>
  <circle cx="468" cy="162" r="6" fill="#00cc44"/>
  <rect x="316" y="182" width="168" height="32" rx="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="334" cy="198" r="10" fill="#002B7F"/>
  <text x="334" y="202" font-family="system-ui,sans-serif" font-size="7" fill="#FCD116" text-anchor="middle">A</text>
  <text x="356" y="195" font-family="system-ui,sans-serif" font-size="10" fill="#FCD116">Antena 1</text>
  <text x="356" y="207" font-family="system-ui,sans-serif" font-size="8" fill="#aaaacc">Divertisment</text>
  <circle cx="468" cy="198" r="6" fill="#00cc44"/>
  <rect x="316" y="218" width="168" height="32" rx="3" fill="#FCD116" opacity="0.15"/>
  <circle cx="334" cy="234" r="10" fill="#FCD116"/>
  <text x="334" y="238" font-family="system-ui,sans-serif" font-size="7" fill="#002B7F" text-anchor="middle">D</text>
  <text x="356" y="231" font-family="system-ui,sans-serif" font-size="10" fill="#FCD116">Digi Sport</text>
  <text x="356" y="243" font-family="system-ui,sans-serif" font-size="8" fill="#aaaacc">Sport • În direct ▶</text>
  <circle cx="468" cy="234" r="6" fill="#ff4444"/>
  <rect x="316" y="254" width="168" height="32" rx="3" fill="#ffffff" opacity="0.08"/>
  <circle cx="334" cy="270" r="10" fill="#555"/>
  <text x="334" y="274" font-family="system-ui,sans-serif" font-size="7" fill="#fff" text-anchor="middle">T</text>
  <text x="356" y="267" font-family="system-ui,sans-serif" font-size="10" fill="#FCD116">TVR 1</text>
  <text x="356" y="279" font-family="system-ui,sans-serif" font-size="8" fill="#aaaacc">Public</text>
  <circle cx="468" cy="270" r="6" fill="#00cc44"/>
  <!-- Home bar -->
  <rect x="370" y="385" width="60" height="5" rx="3" fill="#ffffff" opacity="0.4"/>
  <!-- Connection lines showing device ecosystem -->
  <!-- Arrow left: from WiFi router -->
  <rect x="80" y="180" width="120" height="80" rx="10" fill="#002B7F" opacity="0.1" stroke="#002B7F" stroke-width="2"/>
  <text x="140" y="215" font-family="system-ui,sans-serif" font-size="12" fill="#002B7F" text-anchor="middle" font-weight="bold">M3U / Xtream</text>
  <text x="140" y="232" font-family="system-ui,sans-serif" font-size="11" fill="#002B7F" text-anchor="middle">Playlist URL</text>
  <line x1="200" y1="220" x2="295" y2="220" stroke="#FCD116" stroke-width="3" stroke-dasharray="6,3"/>
  <polygon points="292,213 305,220 292,227" fill="#FCD116"/>
  <!-- Arrow right: to Smart TV -->
  <rect x="600" y="155" width="130" height="110" rx="10" fill="#002B7F" opacity="0.1" stroke="#002B7F" stroke-width="2"/>
  <text x="665" y="195" font-family="system-ui,sans-serif" font-size="12" fill="#002B7F" text-anchor="middle" font-weight="bold">Smart TV</text>
  <text x="665" y="212" font-family="system-ui,sans-serif" font-size="11" fill="#002B7F" text-anchor="middle">Android TV</text>
  <text x="665" y="229" font-family="system-ui,sans-serif" font-size="11" fill="#002B7F" text-anchor="middle">Fire TV Stick</text>
  <text x="665" y="246" font-family="system-ui,sans-serif" font-size="11" fill="#002B7F" text-anchor="middle">iOS / Android</text>
  <line x1="505" y1="220" x2="595" y2="220" stroke="#FCD116" stroke-width="3" stroke-dasharray="6,3"/>
  <polygon points="592,213 605,220 592,227" fill="#FCD116"/>
  <!-- Title bottom -->
  <text x="400" y="430" font-family="system-ui,sans-serif" font-size="17" fill="#002B7F" text-anchor="middle" font-weight="bold">Configurare IPTV Smarters cu Playlist M3U &amp; Xtream Codes</text>
</svg>
