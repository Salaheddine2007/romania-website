<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#002B7F"/>
  <rect x="20" y="20" width="760" height="410" rx="12" fill="#ffffff"/>
  <!-- Title -->
  <text x="400" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="32" font-weight="bold" fill="#002B7F">Ce Înseamnă IPTV?</text>
  <text x="400" y="100" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" fill="#555">Internet Protocol Television</text>
  <!-- Three boxes -->
  <!-- Box 1: Internet -->
  <rect x="60" y="130" width="190" height="160" rx="10" fill="#002B7F"/>
  <text x="155" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="40" fill="#FCD116">🌐</text>
  <text x="155" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Internet</text>
  <text x="155" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ccddff">Conexiune broadband</text>
  <text x="155" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ccddff">sau fibra optică</text>
  <!-- Arrow -->
  <line x1="260" y1="210" x2="305" y2="210" stroke="#FCD116" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Box 2: Server -->
  <rect x="305" y="130" width="190" height="160" rx="10" fill="#CE1126"/>
  <text x="400" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="40" fill="#FCD116">📡</text>
  <text x="400" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Server IPTV</text>
  <text x="400" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ffcccc">Canale românești</text>
  <text x="400" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ffcccc">+ VOD + Sport</text>
  <!-- Arrow -->
  <line x1="505" y1="210" x2="550" y2="210" stroke="#FCD116" stroke-width="3" marker-end="url(#arrow)"/>
  <!-- Box 3: TV -->
  <rect x="550" y="130" width="190" height="160" rx="10" fill="#002B7F"/>
  <text x="645" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="40" fill="#FCD116">📺</text>
  <text x="645" y="215" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#ffffff">Dispozitivul Tău</text>
  <text x="645" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ccddff">Smart TV, Telefon</text>
  <text x="645" y="260" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#ccddff">Tabletă, PC</text>
  <!-- Bottom text -->
  <rect x="60" y="320" width="680" height="80" rx="10" fill="#FCD116"/>
  <text x="400" y="352" text-anchor="middle" font-family="Arial,sans-serif" font-size="15" font-weight="bold" fill="#002B7F">✅ IPTV = televiziune livrată prin internet, nu prin cablu sau satelit</text>
  <text x="400" y="378" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#002B7F">Peste 5000 canale românești și internaționale — oriunde în lume</text>
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#FCD116"/>
    </marker>
  </defs>
  <!-- Branding -->
  <text x="400" y="425" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#888">romaniaiptv.tv</text>
</svg>
