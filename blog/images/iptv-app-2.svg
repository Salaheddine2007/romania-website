<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a5e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#003399;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <circle cx="400" cy="225" r="280" fill="#002070" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" fill="#FCD116" font-size="26" font-family="system-ui" font-weight="800">Aplicație IPTV pe Orice Dispozitiv</text>
  <text x="400" y="72" text-anchor="middle" fill="white" font-size="14" font-family="system-ui">Android • iOS • Smart TV • Windows • Fire TV</text>

  <!-- TV / Monitor (center) -->
  <rect x="260" y="95" width="280" height="175" rx="10" fill="#111" stroke="#FCD116" stroke-width="3"/>
  <rect x="272" y="105" width="256" height="152" rx="4" fill="#0d1b4b"/>
  <rect x="380" y="270" width="40" height="20" fill="#1a1a1a"/>
  <rect x="350" y="290" width="100" height="8" rx="4" fill="#333"/>
  <!-- TV screen content -->
  <text x="400" y="165" text-anchor="middle" fill="#FCD116" font-size="18" font-family="system-ui" font-weight="bold">📺 Romania IPTV</text>
  <text x="400" y="188" text-anchor="middle" fill="white" font-size="12" font-family="system-ui">Pro TV HD • LIVE</text>
  <rect x="320" y="200" width="160" height="42" rx="6" fill="#CE1126"/>
  <text x="400" y="221" text-anchor="middle" fill="white" font-size="11" font-family="system-ui">▶  Acum pe post:</text>
  <text x="400" y="237" text-anchor="middle" fill="white" font-size="10" font-family="system-ui" font-weight="bold">Știrile Pro TV</text>

  <!-- Phone (left) -->
  <rect x="100" y="150" width="110" height="190" rx="16" fill="#1a1a2e" stroke="#FCD116" stroke-width="2"/>
  <rect x="109" y="165" width="92" height="155" rx="4" fill="#0d1b4b"/>
  <text x="155" y="230" text-anchor="middle" fill="#FCD116" font-size="11" font-family="system-ui" font-weight="bold">Android</text>
  <text x="155" y="248" text-anchor="middle" fill="white" font-size="10" font-family="system-ui">IPTV Smarters</text>
  <text x="155" y="268" text-anchor="middle" fill="#00cc44" font-size="18" font-family="system-ui">📱</text>
  <circle cx="155" cy="323" r="8" fill="none" stroke="#555" stroke-width="1.5"/>

  <!-- Tablet (right) -->
  <rect x="590" y="130" width="155" height="115" rx="10" fill="#1a1a2e" stroke="#FCD116" stroke-width="2"/>
  <rect x="600" y="140" width="135" height="90" rx="4" fill="#0d1b4b"/>
  <text x="667" y="188" text-anchor="middle" fill="#FCD116" font-size="11" font-family="system-ui" font-weight="bold">iPad / Tablet</text>
  <text x="667" y="206" text-anchor="middle" fill="white" font-size="10" font-family="system-ui">GSE Smart IPTV</text>
  <rect x="600" y="245" width="145" height="8" rx="4" fill="#333"/>

  <!-- Fire TV stick (bottom right) -->
  <rect x="600" y="290" width="120" height="45" rx="22" fill="#1a1a2e" stroke="#FCD116" stroke-width="2"/>
  <text x="660" y="308" text-anchor="middle" fill="white" font-size="10" font-family="system-ui" font-weight="bold">Fire TV Stick</text>
  <text x="660" y="325" text-anchor="middle" fill="#FCD116" font-size="9" font-family="system-ui">+ IPTV App</text>
  <line x1="660" y1="335" x2="660" y2="360" stroke="#555" stroke-width="2"/>
  <circle cx="660" cy="365" r="8" fill="#333"/>

  <!-- Windows laptop (bottom left) -->
  <rect x="80" y="360" width="160" height="12" rx="2" fill="#333"/>
  <rect x="100" y="305" width="120" height="75" rx="6" fill="#1a1a2e" stroke="#FCD116" stroke-width="2"/>
  <rect x="108" y="312" width="104" height="62" rx="3" fill="#0d1b4b"/>
  <text x="160" y="347" text-anchor="middle" fill="#FCD116" font-size="10" font-family="system-ui" font-weight="bold">Windows PC</text>
  <text x="160" y="362" text-anchor="middle" fill="white" font-size="9" font-family="system-ui">VLC / IPTV Player</text>

  <!-- Connection lines -->
  <line x1="210" y1="245" x2="260" y2="200" stroke="#FCD116" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="540" y1="195" x2="590" y2="185" stroke="#FCD116" stroke-width="1" stroke-dasharray="5,3" opacity="0.6"/>
  <line x1="160" y1="340" x2="280" y2="270" stroke="#FCD116" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>
  <line x1="640" y1="290" x2="540" y2="270" stroke="#FCD116" stroke-width="1" stroke-dasharray="5,3" opacity="0.4"/>

  <!-- Badge -->
  <rect x="320" y="390" width="160" height="40" rx="20" fill="#FCD116"/>
  <text x="400" y="415" text-anchor="middle" fill="#002B7F" font-size="13" font-family="system-ui" font-weight="800">romaniaiptv.tv</text>
</svg>