<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#f5f7ff"/>
  <rect x="0" y="0" width="800" height="8" fill="#002B7F"/>
  <!-- Router/streaming device illustration -->
  <rect x="80" y="150" width="160" height="120" rx="12" fill="#002B7F"/>
  <text x="160" y="200" font-family="Arial,sans-serif" font-size="14" fill="#FCD116" text-anchor="middle" font-weight="bold">INTERNET</text>
  <text x="160" y="220" font-family="Arial,sans-serif" font-size="12" fill="#ffffff" text-anchor="middle">Digi / RDS</text>
  <!-- Arrow -->
  <line x1="245" y1="210" x2="345" y2="210" stroke="#002B7F" stroke-width="3" marker-end="url(#arrow)"/>
  <polygon points="340,203 355,210 340,217" fill="#002B7F"/>
  <!-- IPTV box -->
  <rect x="355" y="155" width="120" height="110" rx="10" fill="#CE1126"/>
  <text x="415" y="200" font-family="Arial,sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">IPTV</text>
  <text x="415" y="220" font-family="Arial,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">Romania IPTV</text>
  <!-- Arrow -->
  <line x1="480" y1="210" x2="560" y2="210" stroke="#002B7F" stroke-width="3"/>
  <polygon points="555,203 570,210 555,217" fill="#002B7F"/>
  <!-- TV screen -->
  <rect x="565" y="140" width="160" height="120" rx="8" fill="#002B7F"/>
  <rect x="578" y="153" width="134" height="90" rx="4" fill="#0a1f5c"/>
  <rect x="595" y="165" width="100" height="65" fill="#1a3a8f"/>
  <text x="645" y="198" font-family="Arial,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">📺 Digi 24</text>
  <text x="645" y="215" font-family="Arial,sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">Pro TV • Antena 1</text>
  <rect x="620" y="265" width="50" height="6" rx="3" fill="#444"/>
  <!-- Labels -->
  <text x="160" y="300" font-family="Arial,sans-serif" font-size="13" fill="#002B7F" text-anchor="middle">Conexiune</text>
  <text x="415" y="295" font-family="Arial,sans-serif" font-size="13" fill="#CE1126" text-anchor="middle">Serviciu IPTV</text>
  <text x="645" y="295" font-family="Arial,sans-serif" font-size="13" fill="#002B7F" text-anchor="middle">TV / Telefon</text>
  <!-- Title -->
  <text x="400" y="380" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#002B7F" text-anchor="middle">Cum functioneaza IPTV Digi</text>
  <text x="400" y="410" font-family="Arial,sans-serif" font-size="14" fill="#555" text-anchor="middle">Stream canale romanesti fara antena sau cablu fizic</text>
</svg>