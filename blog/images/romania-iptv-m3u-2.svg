<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#f0f4ff"/>
  <!-- Smart TV -->
  <rect x="50" y="50" width="420" height="270" rx="16" fill="#002B7F"/>
  <rect x="70" y="68" width="380" height="234" rx="8" fill="#0a1a3a"/>
  <!-- TV screen content - channel playing -->
  <rect x="75" y="73" width="375" height="225" rx="6" fill="#111"/>
  <rect x="80" y="78" width="365" height="215" rx="5" fill="#1a2a4a"/>
  <!-- Playing channel indicator -->
  <rect x="82" y="80" width="120" height="22" rx="4" fill="#CE1126"/>
  <text x="142" y="95" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fff" text-anchor="middle">▶ PRO TV HD</text>
  <!-- Fake video content lines -->
  <rect x="82" y="108" width="361" height="3" rx="1" fill="#2a3a5a" opacity="0.8"/>
  <rect x="82" y="116" width="361" height="3" rx="1" fill="#2a3a5a" opacity="0.6"/>
  <rect x="82" y="124" width="361" height="3" rx="1" fill="#2a3a5a" opacity="0.8"/>
  <circle cx="263" cy="190" r="45" fill="#FCD116" opacity="0.15"/>
  <circle cx="263" cy="190" r="30" fill="#FCD116" opacity="0.25"/>
  <polygon points="252,175 252,205 282,190" fill="#FCD116"/>
  <!-- Progress bar -->
  <rect x="82" y="273" width="361" height="4" rx="2" fill="#333"/>
  <rect x="82" y="273" width="180" height="4" rx="2" fill="#FCD116"/>
  <!-- TV stand -->
  <rect x="220" y="320" width="100" height="14" rx="5" fill="#002B7F"/>
  <rect x="255" y="310" width="32" height="14" rx="3" fill="#002B7F"/>
  <!-- Right: device list -->
  <rect x="510" y="50" width="240" height="330" rx="14" fill="#ffffff" stroke="#002B7F" stroke-width="2"/>
  <rect x="510" y="50" width="240" height="48" rx="14" fill="#002B7F"/>
  <text x="630" y="80" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#FCD116" text-anchor="middle">Compatibil M3U</text>
  <!-- Device items -->
  <rect x="524" y="112" width="212" height="40" rx="8" fill="#FCD116"/>
  <text x="630" y="136" font-family="system-ui,sans-serif" font-size="13" fill="#002B7F" text-anchor="middle" font-weight="600">📺 Smart TV Samsung/LG</text>
  <rect x="524" y="160" width="212" height="40" rx="8" fill="#f5f5f5"/>
  <text x="630" y="184" font-family="system-ui,sans-serif" font-size="13" fill="#002B7F" text-anchor="middle">📱 Android / iPhone</text>
  <rect x="524" y="208" width="212" height="40" rx="8" fill="#f5f5f5"/>
  <text x="630" y="232" font-family="system-ui,sans-serif" font-size="13" fill="#002B7F" text-anchor="middle">💻 VLC / Kodi PC</text>
  <rect x="524" y="256" width="212" height="40" rx="8" fill="#f5f5f5"/>
  <text x="630" y="280" font-family="system-ui,sans-serif" font-size="13" fill="#002B7F" text-anchor="middle">📡 Amazon Fire TV</text>
  <rect x="524" y="304" width="212" height="40" rx="8" fill="#f5f5f5"/>
  <text x="630" y="328" font-family="system-ui,sans-serif" font-size="13" fill="#002B7F" text-anchor="middle">🎮 MAG / Formuler</text>
  <!-- Footer text -->
  <text x="400" y="415" font-family="system-ui,sans-serif" font-size="17" font-weight="700" fill="#002B7F" text-anchor="middle">România IPTV M3U – Funcționează pe Orice Dispozitiv</text>
  <text x="400" y="440" font-family="system-ui,sans-serif" font-size="11" fill="#888" text-anchor="middle">romaniaiptv.tv</text>
</svg>