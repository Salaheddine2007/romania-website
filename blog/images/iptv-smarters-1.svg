  <rect x="195" y="182" width="180" height="28" rx="4" fill="#ffffff" opacity="0.1"/>
  <text x="285" y="201" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Filme</text>
  <rect x="195" y="218" width="180" height="28" rx="4" fill="#ffffff" opacity="0.1"/>
