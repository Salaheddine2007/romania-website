<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#f0f4ff"/>
  <!-- TV Screen -->
  <rect x="150" y="60" width="500" height="290" rx="18" ry="18" fill="#002B7F"/>
