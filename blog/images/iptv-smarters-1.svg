  <rect x="195" y="254" width="180" height="28" rx="4" fill="#ffffff" opacity="0.1"/>
  <text x="285" y="273" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Canale Românești</text>
  <!-- Channel grid -->
  <rect x="395" y="95" width="225" height="220" rx="6" fill="#0e1f4a"/>
  <rect x="402" y="102" width="100" height="60" rx="4" fill="#1e3a7a"/>
  <text x="452" y="137" font-family="system-ui,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">PRO TV</text>
  <rect x="510" y="102" width="100" height="60" rx="4" fill="#1e3a7a"/>
  <text x="560" y="137" font-family="system-ui,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">Antena 1</text>
  <rect x="402" y="170" width="100" height="60" rx="4" fill="#1e3a7a"/>
  <text x="452" y="205" font-family="system-ui,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">Digi Sport</text>
  <rect x="510" y="170" width="100" height="60" rx="4" fill="#1e3a7a"/>
  <text x="560" y="205" font-family="system-ui,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">TVR 1</text>
  <rect x="402" y="238" width="100" height="60" rx="4" fill="#CE1126" opacity="0.8"/>
  <text x="452" y="265" font-family="system-ui,sans-serif" font-size="10" fill="#ffffff" text-anchor="middle">▶ În direct</text>
