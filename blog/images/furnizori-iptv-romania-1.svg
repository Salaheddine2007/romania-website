<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#002B7F"/>
  <rect x="50" y="40" width="700" height="370" rx="20" fill="#001a4d"/>
  <!-- Stars background -->
  <circle cx="100" cy="80" r="2" fill="#FCD116" opacity="0.5"/>
  <circle cx="200" cy="120" r="1.5" fill="#FCD116" opacity="0.4"/>
  <circle cx="650" cy="70" r="2" fill="#FCD116" opacity="0.5"/>
  <circle cx="720" cy="110" r="1.5" fill="#FCD116" opacity="0.3"/>
  <circle cx="300" cy="60" r="1" fill="#FCD116" opacity="0.6"/>
  <!-- Central IPTV hub -->
  <circle cx="400" cy="200" r="55" fill="#FCD116" opacity="0.95"/>
  <text x="400" y="193" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#002B7F" text-anchor="middle">FURNIZORI</text>
  <text x="400" y="212" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#002B7F" text-anchor="middle">IPTV</text>
  <!-- Provider nodes -->
  <circle cx="180" cy="130" r="38" fill="#CE1126"/>
  <text x="180" y="125" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Romania</text>
  <text x="180" y="142" font-family="Arial,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">IPTV</text>
  <circle cx="620" cy="130" r="38" fill="#1a3a8f"/>
  <text x="620" y="125" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Pro TV</text>
  <text x="620" y="142" font-family="Arial,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">Antena 1</text>
  <circle cx="180" cy="290" r="38" fill="#1a3a8f"/>
  <text x="180" y="285" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Digi 24</text>
  <text x="180" y="302" font-family="Arial,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">TVR 1</text>
  <circle cx="620" cy="290" r="38" fill="#CE1126"/>
  <text x="620" y="285" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">Kanal D</text>
  <text x="620" y="302" font-family="Arial,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">Prima TV</text>
  <!-- Connection lines -->
  <line x1="215" y1="153" x2="355" y2="178" stroke="#FCD116" stroke-width="2" opacity="0.6" stroke-dasharray="6,4"/>
  <line x1="585" y1="153" x2="450" y2="178" stroke="#FCD116" stroke-width="2" opacity="0.6" stroke-dasharray="6,4"/>
  <line x1="215" y1="270" x2="355" y2="222" stroke="#FCD116" stroke-width="2" opacity="0.6" stroke-dasharray="6,4"/>
  <line x1="585" y1="270" x2="450" y2="222" stroke="#FCD116" stroke-width="2" opacity="0.6" stroke-dasharray="6,4"/>
  <!-- Title -->
  <text x="400" y="370" font-family="Arial,sans-serif" font-size="26" font-weight="bold" fill="#FCD116" text-anchor="middle">Furnizori IPTV Romania</text>
  <text x="400" y="398" font-family="Arial,sans-serif" font-size="15" fill="#ffffff" text-anchor="middle">Cele mai bune servicii pentru românii din întreaga lume</text>
</svg>
