<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#f0f4ff"/>
  <!-- Screen / TV frame -->
  <rect x="80" y="60" width="500" height="310" rx="18" fill="#002B7F"/>
  <rect x="100" y="80" width="460" height="270" rx="8" fill="#0a1a3a"/>
  <!-- Playlist panel on right -->
  <rect x="620" y="60" width="160" height="310" rx="12" fill="#ffffff" stroke="#002B7F" stroke-width="2"/>
  <text x="700" y="92" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#002B7F" text-anchor="middle">PLAYLIST IPTV</text>
  <!-- Playlist items -->
  <rect x="634" y="104" width="132" height="28" rx="6" fill="#FCD116"/>
  <text x="700" y="122" font-family="system-ui,sans-serif" font-size="11" fill="#002B7F" text-anchor="middle">▶ Pro TV HD</text>
  <rect x="634" y="138" width="132" height="28" rx="6" fill="#f5f5f5"/>
  <text x="700" y="156" font-family="system-ui,sans-serif" font-size="11" fill="#333" text-anchor="middle">Antena 1 HD</text>
  <rect x="634" y="172" width="132" height="28" rx="6" fill="#f5f5f5"/>
  <text x="700" y="190" font-family="system-ui,sans-serif" font-size="11" fill="#333" text-anchor="middle">Digi 24</text>
  <rect x="634" y="206" width="132" height="28" rx="6" fill="#f5f5f5"/>
  <text x="700" y="224" font-family="system-ui,sans-serif" font-size="11" fill="#333" text-anchor="middle">TVR 1</text>
  <rect x="634" y="240" width="132" height="28" rx="6" fill="#f5f5f5"/>
  <text x="700" y="258" font-family="system-ui,sans-serif" font-size="11" fill="#333" text-anchor="middle">Kanal D</text>
  <rect x="634" y="274" width="132" height="28" rx="6" fill="#f5f5f5"/>
  <text x="700" y="292" font-family="system-ui,sans-serif" font-size="11" fill="#333" text-anchor="middle">Prima TV</text>
  <rect x="634" y="308" width="132" height="28" rx="6" fill="#f5f5f5"/>
  <text x="700" y="326" font-family="system-ui,sans-serif" font-size="11" fill="#333" text-anchor="middle">Antena 3</text>
  <!-- TV screen content: play icon -->
  <circle cx="330" cy="215" r="50" fill="#FCD116" opacity="0.9"/>
  <polygon points="315,195 315,235 360,215" fill="#002B7F"/>
  <!-- M3U label on screen -->
  <rect x="110" y="90" width="80" height="26" rx="5" fill="#CE1126"/>
  <text x="150" y="107" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">M3U LIST</text>
  <!-- Bottom stand -->
  <rect x="255" y="370" width="130" height="14" rx="5" fill="#002B7F"/>
  <rect x="295" y="360" width="50" height="14" rx="3" fill="#002B7F"/>
  <!-- Title -->
  <text x="400" y="420" font-family="system-ui,sans-serif" font-size="18" font-weight="700" fill="#002B7F" text-anchor="middle">Playlist IPTV România — Canale Românești HD</text>
  <!-- RomaniaIPTV.tv branding -->
  <text x="400" y="443" font-family="system-ui,sans-serif" font-size="11" fill="#888" text-anchor="middle">romaniaiptv.tv</text>
</svg>
