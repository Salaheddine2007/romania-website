<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#002B7F"/>
  <!-- TV screen shape -->
  <rect x="120" y="60" width="560" height="315" rx="12" fill="#001a4f" stroke="#FCD116" stroke-width="3"/>
  <!-- Screen inner -->
  <rect x="135" y="75" width="530" height="285" rx="8" fill="#0a1a3a"/>
  <!-- Romania flag stripes on screen -->
  <rect x="135" y="75" width="177" height="285" fill="#002B7F"/>
  <rect x="312" y="75" width="176" height="285" fill="#FCD116"/>
  <rect x="488" y="75" width="177" height="285" fill="#CE1126"/>
  <!-- Screen overlay gradient -->
  <rect x="135" y="75" width="530" height="285" rx="8" fill="url(#screenOverlay)" opacity="0.85"/>
  <defs>
    <linearGradient id="screenOverlay" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#001a4f" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#001a4f" stop-opacity="0.7"/>
    </linearGradient>
  </defs>
  <!-- Play button -->
  <circle cx="400" cy="215" r="50" fill="#FCD116" opacity="0.9"/>
  <polygon points="385,190 385,240 435,215" fill="#002B7F"/>
  <!-- TV stand -->
  <rect x="370" y="375" width="60" height="20" rx="4" fill="#FCD116"/>
  <rect x="330" y="392" width="140" height="12" rx="6" fill="#FCD116"/>
  <!-- Title text -->
  <text x="400" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#FCD116">IPTV Canale Românești</text>
  <!-- Subtitle -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" opacity="0.9">RomaniaIPTV.tv — Streaming HD</text>
  <!-- Signal waves -->
  <path d="M 60 215 Q 80 180 60 145" stroke="#FCD116" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 45 215 Q 70 165 45 115" stroke="#FCD116" stroke-width="3" fill="none" opacity="0.4"/>
  <path d="M 740 215 Q 720 180 740 145" stroke="#FCD116" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M 755 215 Q 730 165 755 115" stroke="#FCD116" stroke-width="3" fill="none" opacity="0.4"/>
</svg>