<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002B7F"/>
      <stop offset="100%" style="stop-color:#003da6"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- TV Screen -->
  <rect x="150" y="60" width="400" height="270" rx="18" fill="#1a1a2e" stroke="#FCD116" stroke-width="4"/>
  <rect x="170" y="80" width="360" height="230" rx="8" fill="#0a0a1a"/>
  <!-- Screen content - Romanian flag colors -->
  <rect x="170" y="80" width="120" height="230" rx="0" fill="#002B7F"/>
  <rect x="290" y="80" width="120" height="230" fill="#FCD116"/>
  <rect x="410" y="80" width="120" height="230" rx="0" fill="#CE1126"/>
  <!-- Play button overlay -->
  <circle cx="350" cy="195" r="40" fill="rgba(255,255,255,0.15)"/>
  <polygon points="338,175 338,215 378,195" fill="#FCD116"/>
  <!-- TV Stand -->
  <rect x="320" y="330" width="60" height="20" rx="4" fill="#FCD116"/>
  <rect x="290" y="348" width="120" height="12" rx="6" fill="#FCD116"/>
  <!-- Wifi Signal -->
  <g transform="translate(620,80)">
    <path d="M20,60 Q40,20 80,20 Q120,20 140,60" fill="none" stroke="#FCD116" stroke-width="5" stroke-linecap="round"/>
    <path d="M35,75 Q50,50 80,50 Q110,50 125,75" fill="none" stroke="#FCD116" stroke-width="5" stroke-linecap="round"/>
    <path d="M50,90 Q60,75 80,75 Q100,75 110,90" fill="none" stroke="#FCD116" stroke-width="5" stroke-linecap="round"/>
    <circle cx="80" cy="108" r="8" fill="#FCD116"/>
  </g>
  <!-- Text -->
  <text x="400" y="400" font-family="system-ui,Arial,sans-serif" font-size="28" font-weight="900" fill="#FCD116" text-anchor="middle">Abonament IPTV Romania</text>
  <text x="400" y="432" font-family="system-ui,Arial,sans-serif" font-size="16" fill="rgba(255,255,255,0.8)" text-anchor="middle">500+ Canale Romanesti HD • Romania IPTV</text>
</svg>