<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#002B7F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0041BF;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="450" fill="url(#bgGrad)" rx="16"/>
  <!-- Decorative circles -->
  <circle cx="700" cy="80" r="120" fill="rgba(252,209,22,0.08)"/>
  <circle cx="100" cy="380" r="100" fill="rgba(206,17,38,0.08)"/>
  <!-- TV frame -->
  <rect x="180" y="60" width="440" height="270" rx="12" fill="#1a1a2e" stroke="#FCD116" stroke-width="3"/>
  <!-- TV screen -->
  <rect x="196" y="76" width="408" height="238" rx="6" fill="url(#screenGrad)"/>
  <!-- Screen content - Romanian flag colors bar -->
  <rect x="196" y="76" width="136" height="238" rx="0" fill="#002B7F" opacity="0.7"/>
  <rect x="332" y="76" width="136" height="238" fill="#FCD116" opacity="0.7"/>
  <rect x="468" y="76" width="136" height="238" rx="0" fill="#CE1126" opacity="0.7"/>
  <!-- IPTV Logo overlay -->
  <rect x="270" y="150" width="260" height="100" rx="8" fill="rgba(0,0,0,0.75)"/>
  <text x="400" y="198" font-family="system-ui,Arial,sans-serif" font-size="28" font-weight="900" fill="#FCD116" text-anchor="middle">ROMANIA</text>
  <text x="400" y="230" font-family="system-ui,Arial,sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" text-anchor="middle">IPTV</text>
  <!-- TV stand -->
  <rect x="370" y="330" width="60" height="20" rx="4" fill="#333"/>
  <rect x="340" y="348" width="120" height="12" rx="6" fill="#444"/>
  <!-- Subscription badge -->
  <circle cx="580" cy="110" r="46" fill="#FCD116"/>
  <text x="580" y="102" font-family="system-ui,Arial,sans-serif" font-size="11" font-weight="700" fill="#002B7F" text-anchor="middle">ABONA-</text>
  <text x="580" y="117" font-family="system-ui,Arial,sans-serif" font-size="11" font-weight="700" fill="#002B7F" text-anchor="middle">MENT</text>
  <text x="580" y="134" font-family="system-ui,Arial,sans-serif" font-size="10" font-weight="600" fill="#CE1126" text-anchor="middle">ACTIV ✓</text>
  <!-- Title text -->
  <text x="400" y="408" font-family="system-ui,Arial,sans-serif" font-size="20" font-weight="700" fill="#FFFFFF" text-anchor="middle">Abonament IPTV Romania</text>
  <text x="400" y="432" font-family="system-ui,Arial,sans-serif" font-size="13" fill="#FCD116" text-anchor="middle">Canale românești HD oriunde în lume</text>
</svg>
