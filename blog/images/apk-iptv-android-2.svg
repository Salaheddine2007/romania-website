<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#002B7F;stop-opacity:1"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg2)"/>
  <!-- TV Box -->
  <rect x="100" y="150" width="340" height="200" rx="15" fill="#1a1a3e" stroke="#FCD116" stroke-width="2"/>
  <!-- TV Screen content -->
  <rect x="115" y="165" width="310" height="170" rx="8" fill="#0f0f20"/>
  <!-- Flag bar -->
  <rect x="115" y="165" width="103" height="170" rx="8" fill="#002B7F"/>
  <rect x="218" y="165" width="103" height="170" fill="#FCD116"/>
  <rect x="321" y="165" width="104" height="170" rx="8" fill="#CE1126"/>
  <!-- Romania text overlay -->
  <text x="270" y="260" text-anchor="middle" fill="white" font-size="32" font-family="system-ui" font-weight="900" opacity="0.9">ROMÂNIA</text>
  <text x="270" y="295" text-anchor="middle" fill="white" font-size="16" font-family="system-ui" font-weight="bold" opacity="0.85">IPTV pe Android TV Box</text>
  <!-- APK steps on right -->
  <text x="480" y="130" fill="#FCD116" font-size="22" font-family="system-ui" font-weight="bold">Instalare APK</text>
  <text x="480" y="160" fill="rgba(255,255,255,0.9)" font-size="13" font-family="system-ui">1. Descarcă APK-ul</text>
  <rect x="476" y="170" width="260" height="3" rx="2" fill="#FCD116" opacity="0.4"/>
  <text x="480" y="195" fill="rgba(255,255,255,0.9)" font-size="13" font-family="system-ui">2. Activează surse necunoscute</text>
  <rect x="476" y="205" width="260" height="3" rx="2" fill="#FCD116" opacity="0.4"/>
  <text x="480" y="230" fill="rgba(255,255,255,0.9)" font-size="13" font-family="system-ui">3. Instalează aplicația</text>
  <rect x="476" y="240" width="260" height="3" rx="2" fill="#FCD116" opacity="0.4"/>
  <text x="480" y="265" fill="rgba(255,255,255,0.9)" font-size="13" font-family="system-ui">4. Introdu datele IPTV</text>
  <rect x="476" y="275" width="260" height="3" rx="2" fill="#FCD116" opacity="0.4"/>
  <text x="480" y="300" fill="rgba(255,255,255,0.9)" font-size="13" font-family="system-ui">5. Bucură-te de canale RO</text>
  <rect x="476" y="310" width="260" height="3" rx="2" fill="#FCD116" opacity="0.4"/>
  <!-- CTA -->
  <rect x="476" y="330" width="260" height="45" rx="22" fill="#CE1126"/>
  <text x="606" y="358" text-anchor="middle" fill="white" font-size="15" font-family="system-ui" font-weight="bold">RomaniaIPTV.tv</text>
  <!-- Bottom text -->
  <text x="270" y="420" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="12" font-family="system-ui">romaniaiptv.tv – Streaming Premium Românesc</text>
</svg>