<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#f0f4ff"/>
  <!-- Header bar -->
  <rect width="800" height="70" fill="#002B7F"/>
  <text x="400" y="44" font-family="system-ui,Arial,sans-serif" font-size="22" font-weight="900" fill="#FCD116" text-anchor="middle">Instalare Abonament IPTV Romania</text>
  <!-- Smart TV -->
  <rect x="60" y="110" width="180" height="130" rx="10" fill="#1a1a2e" stroke="#002B7F" stroke-width="3"/>
  <rect x="73" y="123" width="154" height="100" rx="5" fill="#002B7F"/>
  <text x="150" y="178" font-family="system-ui,Arial,sans-serif" font-size="13" fill="#FCD116" text-anchor="middle" font-weight="bold">Smart TV</text>
  <text x="150" y="198" font-family="system-ui,Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">Samsung / LG</text>
  <rect x="125" y="240" width="50" height="10" rx="5" fill="#002B7F"/>
  <rect x="100" y="250" width="100" height="8" rx="4" fill="#002B7F"/>
  <!-- Android Phone -->
  <rect x="310" y="100" width="90" height="155" rx="14" fill="#1a1a2e" stroke="#002B7F" stroke-width="3"/>
  <rect x="320" y="115" width="70" height="120" rx="5" fill="#002B7F"/>
  <text x="355" y="180" font-family="system-ui,Arial,sans-serif" font-size="12" fill="#FCD116" text-anchor="middle" font-weight="bold">Android</text>
  <text x="355" y="197" font-family="system-ui,Arial,sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" text-anchor="middle">iOS &amp; Android</text>
  <circle cx="355" cy="245" r="8" fill="#333"/>
  <!-- Laptop -->
  <rect x="480" y="115" width="200" height="130" rx="8" fill="#1a1a2e" stroke="#002B7F" stroke-width="3"/>
  <rect x="492" y="126" width="176" height="108" rx="5" fill="#002B7F"/>
  <text x="580" y="185" font-family="system-ui,Arial,sans-serif" font-size="13" fill="#FCD116" text-anchor="middle" font-weight="bold">Laptop / PC</text>
  <text x="580" y="205" font-family="system-ui,Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.7)" text-anchor="middle">Windows / Mac</text>
  <rect x="440" y="245" width="280" height="16" rx="8" fill="#333"/>
  <!-- Center IPTV logo -->
  <circle cx="400" cy="195" r="42" fill="#FCD116"/>
  <text x="400" y="188" font-family="system-ui,Arial,sans-serif" font-size="14" font-weight="900" fill="#002B7F" text-anchor="middle">IPTV</text>
  <text x="400" y="207" font-family="system-ui,Arial,sans-serif" font-size="11" font-weight="700" fill="#002B7F" text-anchor="middle">ROMANIA</text>
  <!-- Connection lines -->
  <line x1="240" y1="195" x2="358" y2="195" stroke="#FCD116" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="442" y1="195" x2="480" y2="195" stroke="#FCD116" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="355" y1="153" x2="380" y2="165" stroke="#FCD116" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Bottom text -->
  <text x="400" y="305" font-family="system-ui,Arial,sans-serif" font-size="18" font-weight="800" fill="#002B7F" text-anchor="middle">Compatibil cu Orice Dispozitiv</text>
  <text x="400" y="330" font-family="system-ui,Arial,sans-serif" font-size="14" fill="#555" text-anchor="middle">Activare imediata — Suport in romana 24/7</text>
  <!-- Romanian flag stripe at bottom -->
  <rect x="0" y="390" width="267" height="60" fill="#002B7F"/>
  <rect x="267" y="390" width="267" height="60" fill="#FCD116"/>
  <rect x="534" y="390" width="266" height="60" fill="#CE1126"/>
  <text x="400" y="428" font-family="system-ui,Arial,sans-serif" font-size="15" font-weight="700" fill="#002B7F" text-anchor="middle">romaniaiptv.tv</text>
</svg>