<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a5c"/>
      <stop offset="100%" style="stop-color:#002B7F"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>
  <!-- Connection diagram: Server -> App -> TV -->
  <!-- Server box -->
  <rect x="60" y="160" width="140" height="130" rx="12" fill="#0a3d9e" stroke="#FCD116" stroke-width="2"/>
  <text x="130" y="195" font-family="system-ui,sans-serif" font-size="13" fill="#FCD116" text-anchor="middle" font-weight="bold">XTREAM</text>
  <text x="130" y="213" font-family="system-ui,sans-serif" font-size="13" fill="#FCD116" text-anchor="middle" font-weight="bold">SERVER</text>
  <rect x="80" y="225" width="100" height="8" rx="4" fill="white" opacity="0.3"/>
  <rect x="80" y="242" width="80" height="8" rx="4" fill="white" opacity="0.3"/>
  <rect x="80" y="259" width="90" height="8" rx="4" fill="white" opacity="0.3"/>
  <!-- Arrow 1 -->
  <line x1="200" y1="225" x2="290" y2="225" stroke="#FCD116" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="285,218 300,225 285,232" fill="#FCD116"/>
  <!-- App/Player box -->
  <rect x="300" y="160" width="200" height="130" rx="12" fill="#001a5c" stroke="#FCD116" stroke-width="2"/>
  <text x="400" y="195" font-family="system-ui,sans-serif" font-size="13" fill="white" text-anchor="middle" font-weight="bold">IPTV PLAYER</text>
  <rect x="320" y="210" width="160" height="60" rx="6" fill="#002B7F"/>
  <polygon points="385,225 385,255 415,240" fill="#FCD116"/>
  <text x="400" y="278" font-family="system-ui,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">Smarters / TiviMate</text>
  <!-- Arrow 2 -->
  <line x1="500" y1="225" x2="590" y2="225" stroke="#FCD116" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="585,218 600,225 585,232" fill="#FCD116"/>
  <!-- TV box -->
  <rect x="600" y="160" width="140" height="130" rx="12" fill="#0a3d9e" stroke="#FCD116" stroke-width="2"/>
  <rect x="615" y="175" width="110" height="70" rx="4" fill="#001a5c"/>
  <rect x="618" y="178" width="104" height="64" rx="3" fill="#000820"/>
  <rect x="625" y="185" width="40" height="5" rx="2" fill="#FCD116" opacity="0.8"/>
  <rect x="625" y="197" width="70" height="5" rx="2" fill="white" opacity="0.4"/>
  <rect x="625" y="209" width="55" height="5" rx="2" fill="white" opacity="0.4"/>
  <text x="670" y="265" font-family="system-ui,sans-serif" font-size="12" fill="white" text-anchor="middle">Smart TV</text>
  <text x="670" y="282" font-family="system-ui,sans-serif" font-size="12" fill="#FCD116" text-anchor="middle">Android / iOS</text>
  <!-- Labels -->
  <text x="400" y="80" font-family="system-ui,sans-serif" font-size="26" font-weight="bold" fill="white" text-anchor="middle">Cum Funcționează</text>
  <text x="400" y="115" font-family="system-ui,sans-serif" font-size="22" font-weight="bold" fill="#FCD116" text-anchor="middle">Xtream Codes IPTV</text>
  <!-- URL + URL, Password labels -->
  <text x="130" y="320" font-family="system-ui,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">URL + Port</text>
  <text x="400" y="320" font-family="system-ui,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">User / Pass</text>
  <text x="670" y="320" font-family="system-ui,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">Live TV / VOD</text>
  <!-- Romanian accent -->
  <rect x="320" y="390" width="24" height="32" rx="2" fill="#002B7F"/>
  <rect x="344" y="390" width="24" height="32" rx="2" fill="#FCD116"/>
  <rect x="368" y="390" width="24" height="32" rx="2" fill="#CE1126"/>
  <text x="410" y="412" font-family="system-ui,sans-serif" font-size="13" fill="white" opacity="0.7">romaniaiptv.tv</text>
</svg>
