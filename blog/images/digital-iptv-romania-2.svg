  <circle cx="300" cy="360" r="8" fill="#CE1126"/>
  <text x="230" y="358" font-family="Arial" font-size="11" fill="white">🇧🇪 Belgia</text>
  <circle cx="500" cy="370" r="8" fill="#CE1126"/>
  <text x="520" y="368" font-family="Arial" font-size="11" fill="white">🇪🇸 Spania</text>
  <!-- Title -->
  <text x="400" y="55" font-family="Arial" font-size="26" fill="white" text-anchor="middle" font-weight="bold">Digital IPTV Romania</text>
  <text x="400" y="85" font-family="Arial" font-size="16" fill="#FCD116" text-anchor="middle">Canale Românești pentru Diaspora</text>
  <!-- Bottom bar -->
  <rect x="0" y="415" width="800" height="35" fill="#001a4d"/>
  <text x="400" y="438" font-family="Arial" font-size="14" fill="#FCD116" text-anchor="middle">romaniaiptv.tv – Streaming HD oriunde în lume</text>
