  <line x1="400" y1="200" x2="150" y2="120" stroke="#FCD116" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5"/>
  <line x1="400" y1="200" x2="650" y2="130" stroke="#FCD116" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5"/>
  <line x1="400" y1="200" x2="120" y2="320" stroke="#FCD116" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5"/>
  <line x1="400" y1="200" x2="680" y2="310" stroke="#FCD116" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5"/>
  <line x1="400" y1="200" x2="300" y2="360" stroke="#FCD116" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5"/>
  <line x1="400" y1="200" x2="500" y2="370" stroke="#FCD116" stroke-width="1.5" opacity="0.5" stroke-dasharray="5,5"/>
  <!-- Location dots -->
  <circle cx="150" cy="120" r="8" fill="#CE1126"/>
  <text x="170" y="115" font-family="Arial" font-size="11" fill="white">🇩🇪 Germania</text>
  <circle cx="650" cy="130" r="8" fill="#CE1126"/>
  <text x="590" y="120" font-family="Arial" font-size="11" fill="white">🇬🇧 UK</text>
  <circle cx="120" cy="320" r="8" fill="#CE1126"/>
  <text x="140" y="325" font-family="Arial" font-size="11" fill="white">🇫🇷 Franța</text>
  <circle cx="680" cy="310" r="8" fill="#CE1126"/>
