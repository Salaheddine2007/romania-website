  <circle cx="400" cy="200" r="80" fill="none" stroke="#FCD116" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="200" r="40" fill="#FCD116" opacity="0.9"/>
  <text x="400" y="210" font-family="Arial" font-size="32" fill="#002B7F" text-anchor="middle">📡</text>
