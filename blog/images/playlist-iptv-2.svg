<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450">
  <rect width="800" height="450" fill="#fff9e6"/>
  <!-- Header bar -->
  <rect width="800" height="70" fill="#002B7F"/>
  <text x="400" y="42" font-family="system-ui,sans-serif" font-size="22" font-weight="700" fill="#FCD116" text-anchor="middle">Cum să folosești o Playlist IPTV</text>
  <text x="400" y="62" font-family="system-ui,sans-serif" font-size="13" fill="#ffffff" text-anchor="middle">Ghid pas cu pas pentru România</text>
  <!-- Step boxes -->
  <!-- Step 1 -->
  <rect x="40" y="100" width="160" height="200" rx="12" fill="#002B7F"/>
  <text x="120" y="140" font-family="system-ui,sans-serif" font-size="38" fill="#FCD116" text-anchor="middle">1</text>
  <text x="120" y="168" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Alege</text>
  <text x="120" y="186" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Furnizorul</text>
  <text x="120" y="210" font-family="system-ui,sans-serif" font-size="11" fill="#FCD116" text-anchor="middle">romaniaiptv.tv</text>
  <text x="120" y="230" font-family="system-ui,sans-serif" font-size="10" fill="#cce" text-anchor="middle">Serviciu IPTV</text>
  <text x="120" y="248" font-family="system-ui,sans-serif" font-size="10" fill="#cce" text-anchor="middle">legal &amp; stabil</text>
  <!-- Step 2 -->
  <rect x="220" y="100" width="160" height="200" rx="12" fill="#1a3a8a"/>
  <text x="300" y="140" font-family="system-ui,sans-serif" font-size="38" fill="#FCD116" text-anchor="middle">2</text>
  <text x="300" y="168" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Primești</text>
  <text x="300" y="186" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Link M3U</text>
  <text x="300" y="215" font-family="system-ui,sans-serif" font-size="10" fill="#aac" text-anchor="middle">http://server/</text>
  <text x="300" y="232" font-family="system-ui,sans-serif" font-size="10" fill="#aac" text-anchor="middle">playlist.m3u</text>
  <!-- Step 3 -->
  <rect x="400" y="100" width="160" height="200" rx="12" fill="#002B7F"/>
  <text x="480" y="140" font-family="system-ui,sans-serif" font-size="38" fill="#FCD116" text-anchor="middle">3</text>
  <text x="480" y="168" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Instalezi</text>
  <text x="480" y="186" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Aplicația</text>
  <text x="480" y="215" font-family="system-ui,sans-serif" font-size="10" fill="#aac" text-anchor="middle">Smarters Pro</text>
  <text x="480" y="232" font-family="system-ui,sans-serif" font-size="10" fill="#aac" text-anchor="middle">IPTV Extreme</text>
  <text x="480" y="249" font-family="system-ui,sans-serif" font-size="10" fill="#aac" text-anchor="middle">VLC Media</text>
  <!-- Step 4 -->
  <rect x="580" y="100" width="180" height="200" rx="12" fill="#CE1126"/>
  <text x="670" y="140" font-family="system-ui,sans-serif" font-size="38" fill="#FCD116" text-anchor="middle">4</text>
  <text x="670" y="168" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">Bucură-te</text>
  <text x="670" y="186" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">de TV!</text>
  <text x="670" y="215" font-family="system-ui,sans-serif" font-size="10" fill="#fdd" text-anchor="middle">1000+ canale</text>
  <text x="670" y="232" font-family="system-ui,sans-serif" font-size="10" fill="#fdd" text-anchor="middle">românești &amp; int.</text>
  <!-- arrows between steps -->
  <text x="200" y="205" font-family="system-ui,sans-serif" font-size="22" fill="#002B7F" text-anchor="middle">→</text>
  <text x="380" y="205" font-family="system-ui,sans-serif" font-size="22" fill="#002B7F" text-anchor="middle">→</text>
  <text x="560" y="205" font-family="system-ui,sans-serif" font-size="22" fill="#002B7F" text-anchor="middle">→</text>
  <!-- Footer note -->
  <text x="400" y="340" font-family="system-ui,sans-serif" font-size="14" fill="#002B7F" text-anchor="middle" font-weight="600">Playlist IPTV compatibilă cu Smart TV, Android, iOS, PC și MAG</text>
  <text x="400" y="365" font-family="system-ui,sans-serif" font-size="12" fill="#555" text-anchor="middle">Canale românești oriunde în lume | romaniaiptv.tv</text>
  <!-- Flag colors strip -->
  <rect x="0" y="420" width="267" height="30" fill="#002B7F"/>
  <rect x="267" y="420" width="266" height="30" fill="#FCD116"/>
  <rect x="533" y="420" width="267" height="30" fill="#CE1126"/>
</svg>
