  <text x="355" y="180" fill="#fff" font-family="Arial" font-size="8" text-anchor="middle">IPTV M3U</text>
  <circle cx="355" cy="242" r="6" fill="#FCD116"/>
  <text x="355" y="285" fill="#002B7F" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">Android</text>
  <!-- Windows/Laptop -->
  <rect x="470" y="110" width="160" height="110" rx="8" fill="#002B7F"/>
