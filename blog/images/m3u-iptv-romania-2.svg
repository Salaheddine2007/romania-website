  <text x="145" y="155" fill="#FCD116" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">Smart TV</text>
  <text x="145" y="172" fill="#fff" font-family="Arial" font-size="10" text-anchor="middle">IPTV Smarters</text>
  <rect x="105" y="205" width="80" height="6" rx="3" fill="#FCD116"/>
