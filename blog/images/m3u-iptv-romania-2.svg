  <text x="130" y="390" fill="#002B7F" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">MAG / Formuler</text>
  <!-- Fire TV -->
  <ellipse cx="450" cy="340" rx="55" ry="18" fill="#222"/>
  <rect x="438" y="325" width="24" height="12" rx="3" fill="#FF9900"/>
