  <text x="550" y="174" fill="#fff" font-family="Arial" font-size="9" text-anchor="middle">M3U Playlist</text>
  <rect x="450" y="220" width="200" height="12" rx="3" fill="#002B7F"/>
  <rect x="510" y="232" width="80" height="20" rx="3" fill="#FCD116"/>
  <text x="550" y="268" fill="#002B7F" font-family="Arial" font-size="13" font-weight="bold" text-anchor="middle">PC / Mac</text>
  <!-- MAG Box -->
  <rect x="60" y="310" width="140" height="70" rx="8" fill="#333"/>
  <rect x="75" y="320" width="110" height="40" rx="3" fill="#111"/>
