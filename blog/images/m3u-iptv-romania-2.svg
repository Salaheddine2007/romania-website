  <rect y="16" width="800" height="8" fill="#CE1126"/>
  <!-- Title -->
  <text x="400" y="75" fill="#002B7F" font-family="Arial" font-size="24" font-weight="bold" text-anchor="middle">M3U IPTV Romania pe Orice Dispozitiv</text>
  <!-- Smart TV -->
  <rect x="60" y="100" width="170" height="140" rx="10" fill="#002B7F"/>
