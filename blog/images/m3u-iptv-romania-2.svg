  <circle cx="650" cy="398" r="8" fill="#666"/>
  <text x="650" y="432" fill="#002B7F" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle">iPhone / iPad</text>
  <!-- Bottom branding -->
  <text x="400" y="445" fill="#002B7F" font-family="Arial" font-size="11" text-anchor="middle" font-weight="bold">romaniaiptv.tv – M3U IPTV Romania compatibil cu toate dispozitivele</text>
