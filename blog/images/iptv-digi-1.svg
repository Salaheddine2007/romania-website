<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#002B7F"/>
  <rect x="50" y="50" width="700" height="350" rx="20" fill="#001a4d"/>
  <rect x="80" y="80" width="640" height="260" rx="10" fill="#0a1f5c"/>
  <!-- TV screen effect -->
  <rect x="100" y="100" width="600" height="220" rx="8" fill="#1a3a8f"/>
  <!-- DIGI logo area -->
  <circle cx="400" cy="210" r="60" fill="#FCD116" opacity="0.9"/>
  <text x="400" y="220" font-family="Arial,sans-serif" font-size="36" font-weight="bold" fill="#002B7F" text-anchor="middle">DIGI</text>
  <!-- Signal bars -->
  <rect x="150" y="260" width="15" height="30" fill="#FCD116" rx="3"/>
  <rect x="175" y="245" width="15" height="45" fill="#FCD116" rx="3"/>
  <rect x="200" y="230" width="15" height="60" fill="#FCD116" rx="3"/>
  <rect x="225" y="215" width="15" height="75" fill="#FCD116" rx="3"/>
  <!-- Title text -->
  <text x="400" y="370" font-family="Arial,sans-serif" font-size="28" font-weight="bold" fill="#FCD116" text-anchor="middle">IPTV Digi Romania</text>
  <text x="400" y="400" font-family="Arial,sans-serif" font-size="16" fill="#ffffff" text-anchor="middle">Canale romanesti oriunde in lume</text>
</svg>