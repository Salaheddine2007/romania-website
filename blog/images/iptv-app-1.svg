      <stop offset="0%" style="stop-color:#002B7F;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0047CC;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="screen1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d2b;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#111133;stop-opacity:1"/>
